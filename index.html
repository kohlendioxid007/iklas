  --next-color: #4ab3c8;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--deep);
  color: var(--text);
}

body {
  font-family: 'Georgia', serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(74,179,200,0.05) 0%, transparent 50%),
    linear-gradient(180deg, #080b12 0%, #0a0d14 100%);
}

/* ─── HEADER ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 3rem 1rem;
  border-bottom: 1px solid rgba(201,168,76,0.2);
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 6px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.mosque-name {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.2rem;
}

.mosque-ar {
  font-family: 'Maghribi', serif;
  font-size: clamp(1.8rem, 3.5vw, 3rem);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  line-height: 1.1;
}

.mosque-de {
  font-size: clamp(0.75rem, 1.2vw, 1rem);
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  direction: ltr;
}

.ornament {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.dome-icon {
  width: clamp(50px, 7vw, 80px);
  height: clamp(50px, 7vw, 80px);
  opacity: 0.85;
}

.header-info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.3rem;
  direction: ltr;
}

/* ─── CLOCK ─── */
.clock-block {
  text-align: left;
}

.clock-time {
  font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 300;
  letter-spacing: 0.05em;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.clock-date-de {
  font-size: clamp(0.7rem, 1.8vw, 0.95rem);
  color: var(--text-dim);
  letter-spacing: 0.05em;
  margin-top: 0.2rem;
}

.clock-date-hijri {
  font-family: 'Maghribi', serif;
  font-size: clamp(0.9rem, 1.8vw, 1.4rem);
  color: var(--gold-dim);
  margin-top: 0.1rem;
  direction: rtl;
}

/* ─── MAIN ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 1rem 3rem 1.5rem;
  gap: 1rem;
  min-height: 0;
}

/* ─── NEXT PRAYER BANNER ─── */
.next-banner {
  background: linear-gradient(135deg, rgba(74,179,200,0.08), rgba(74,179,200,0.04));
  border: 1px solid rgba(74,179,200,0.25);
  border-radius: 12px;
  padding: 0.8rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.next-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(74,179,200,0.06), transparent);
}

.next-label {
  font-size: clamp(0.7rem, 1vw, 0.85rem);
  color: rgba(74,179,200,0.7);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  direction: ltr;
}

.next-prayer-name {
  font-family: 'Maghribi', serif;
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  color: var(--next-color);
  text-shadow: 0 0 20px rgba(74,179,200,0.4);
  direction: rtl;
}

.next-prayer-name-de {
  font-size: clamp(0.8rem, 1.2vw, 1rem);
  color: rgba(74,179,200,0.6);
  direction: ltr;
}

.countdown {
  direction: ltr;
  text-align: left;
}

.countdown-time {
  font-size: clamp(1.8rem, 4vw, 3.5rem);
  font-weight: 200;
  color: var(--next-color);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
  line-height: 1;
}

.countdown-label {
font-size: clamp(1rem, 1.8vw, 1.5rem);
  color: rgba(74,179,200,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-align: center;
  margin-top: 0.2rem;
}

/* ─── PRAYER GRID ─── */
.prayers-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0.8rem;
  flex: 1;
}

.prayer-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 1.2rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  position: relative;
  overflow: hidden;
  transition: all 0.5s ease;
}

.prayer-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  opacity: 0;
  transition: opacity 0.5s;
}

.prayer-card.active {
  background: var(--active-bg);
  border-color: rgba(201,168,76,0.3);
  box-shadow:
    0 0 40px rgba(201,168,76,0.08),
    inset 0 0 30px rgba(201,168,76,0.04);
}

.prayer-card.active::before { opacity: 1; }

.prayer-card.next-up {
  background: rgba(74,179,200,0.05);
  border-color: rgba(74,179,200,0.25);
}

.prayer-name-ar {
  font-family: 'Maghribi', serif;
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
  color: var(--gold);
  text-align: center;
  line-height: 1.1;
  direction: rtl;
  transition: color 0.5s;
}

.prayer-card.active .prayer-name-ar {
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(201,168,76,0.5);
}

.prayer-card.next-up .prayer-name-ar {
  color: var(--next-color);
}

.prayer-name-de {
  font-size: clamp(0.80rem, 1.80vw, 1.0rem);
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  direction: ltr;
}

.prayer-card.active .prayer-name-de {
  color: rgba(201,168,76,0.6);
}

.prayer-card.next-up .prayer-name-de {
  color: rgba(74,179,200,0.6);
}

.prayer-time {
  font-size: clamp(1.6rem, 3vw, 2.6rem);
  font-weight: 200;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
  color: var(--text);
  direction: ltr;
  transition: color 0.5s;
}

.prayer-card.active .prayer-time {
  color: var(--gold-light);
}

.prayer-card.next-up .prayer-time {
  color: var(--next-color);
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: transparent;
  transition: background 0.5s;
}

.prayer-card.active .status-dot {
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
  animation: pulse 2s ease-in-out infinite;
}

.prayer-card.next-up .status-dot {
  background: var(--next-color);
  box-shadow: 0 0 8px var(--next-color);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

/* ─── FOOTER ─── */
.footer {
  padding: 0.6rem 3rem;
  border-top: 1px solid rgba(201,168,76,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-text {
  font-family: 'Maghribi', serif;
  font-size: clamp(0.9rem, 1.5vw, 1.3rem);
  color: var(--text-dim);
  direction: rtl;
}

.footer-method {
  font-size: clamp(0.55rem, 0.8vw, 0.7rem);
  color: rgba(138,122,90,0.5);
  letter-spacing: 0.1em;
  direction: ltr;
}

/* Decorative divider lines */
.divider {
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--gold-dim), transparent);
  align-self: stretch;
  opacity: 0.3;
}
</style>
</head>

const PRAYERS = [
  { key: 'p1', ar: 'الفجر',  de: 'Fajr',  en: 'Fajr'    },
  { key: 'p2', ar: 'الشروق', de: 'Schuruk',  en: 'Shuruk'  },
  { key: 'p3', ar: 'الظهر',  de: 'Duhr',     en: 'Dhuhr'   },
  { key: 'p4', ar: 'العصر',  de: 'Asr',      en: 'Asr'     },
  { key: 'p5', ar: 'المغرب', de: 'Maghrib',  en: 'Maghrib' },
  { key: 'p6', ar: 'العشاء', de: 'Ischa',    en: 'Isha'    },
];

const DAYS_DE = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const HIJRI_MONTHS_AR = ['محرم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الثانية','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];

function getTodayTimes() {
  const now = new Date();
  const month = (now.getMonth() + 1).toString();
  const day = now.getDate().toString();
  const entry = PRAYER_DATA[month] && PRAYER_DATA[month][day];
  return entry || null;
}

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function formatCountdown(secsTotal) {
  const h = Math.floor(secsTotal / 3600);
  const m = Math.floor((secsTotal % 3600) / 60);
  const s = secsTotal % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatHijri(hijriStr) {
  const [y, m, d] = hijriStr.split('/').map(Number);
  const monthName = HIJRI_MONTHS_AR[m - 1] || '';
  return `${d} ${monthName} ${y} `;
}

function buildGrid(todayTimes) {
  const grid = document.getElementById('prayers-grid');
  grid.innerHTML = PRAYERS.map(p => `
    <div class="prayer-card" id="card-${p.key}">
      <div class="prayer-name-ar">${p.ar}</div>
      <div class="prayer-name-de">${p.de}</div>
      <div class="prayer-time" id="time-${p.key}">${todayTimes ? todayTimes[p.key].t : '--:--'}</div>
      <div class="status-dot" id="dot-${p.key}"></div>
    </div>
  `).join('');
}

function update() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const nowMins = h * 60 + m;
  const nowSecs = h * 3600 + m * 60 + s;

  // Clock
  document.getElementById('clock').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  // Date DE
  const day = DAYS_DE[now.getDay()];
  const date = `${day}, ${now.getDate()}. ${MONTHS_DE[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('date-de').textContent = date;

  const todayTimes = getTodayTimes();
  if (!todayTimes) return;

  // Hijri
  const hijri = formatHijri(todayTimes.hijri_date);
  document.getElementById('date-hijri').textContent = hijri;
  document.getElementById('hijri-footer').textContent = hijri;

  // Find current and next prayer
  const times = PRAYERS.map(p => ({ ...p, mins: timeToMinutes(todayTimes[p.key].t), secs: timeToMinutes(todayTimes[p.key].t) * 60 }));

  let currentIdx = -1;
  let nextIdx = -1;

  for (let i = 0; i < times.length; i++) {
    if (nowMins >= times[i].mins) currentIdx = i;
  }

  // Next prayer
  nextIdx = currentIdx + 1;
  if (nextIdx >= times.length) nextIdx = 0; // wrap to next day

  // Update cards
  PRAYERS.forEach((p, i) => {
    const card = document.getElementById('card-' + p.key);
    card.classList.remove('active', 'next-up');
    if (i === currentIdx) card.classList.add('active');
    else if (i === nextIdx) card.classList.add('next-up');
  });

  // Countdown
  let secsLeft;
  if (nextIdx > currentIdx) {
    secsLeft = times[nextIdx].secs - nowSecs;
  } else {
    // Next day fajr - estimate 24h minus remaining
    secsLeft = (24 * 3600) - nowSecs + times[0].secs;
  }
  if (secsLeft < 0) secsLeft = 0;

  document.getElementById('countdown').textContent = formatCountdown(secsLeft);

  // Next prayer name
  if (nextIdx < PRAYERS.length) {
    document.getElementById('next-name-ar').textContent = PRAYERS[nextIdx].ar;
    document.getElementById('next-name-de').textContent = PRAYERS[nextIdx].de;
  } else {
    document.getElementById('next-name-ar').textContent = PRAYERS[0].ar;
    document.getElementById('next-name-de').textContent = PRAYERS[0].de;
  }
}

// Init
const todayTimes = getTodayTimes();
buildGrid(todayTimes);
update();
setInterval(update, 1000);
